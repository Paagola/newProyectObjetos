name: Compilar y Testear con Maven

on:
  push:
    branches: [ "mejora" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Java 8
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Compilar el proyecto con Maven
        run: mvn compile

      - name: Ejecutar las pruebas unitarias
        run: mvn test
